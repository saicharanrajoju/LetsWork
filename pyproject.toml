[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "letswork"
version = "0.1.0"
description = "Real-time collaborative coding via MCP — two developers, one codebase"
readme = "README.md"
license = "MIT"
requires-python = ">= 3.10"
authors = [{ name = "Sai Charan Rajoju" }]
dependencies = [
    "mcp[cli]>=1.0.0",
    "click>=8.1.0"
]

[project.scripts]
letswork = "src.cli:cli"

[tool.hatch.build.targets.wheel]
packages = ["src"]
